<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B2A3A" />
    <link rel="icon" type="image/png" href="/biohum-sales/favicon.png" />
    <link rel="manifest" href="/biohum-sales/manifest.webmanifest" />
    <title>Biohum Visitas</title>
    <style>
      /* Initial splash (fast, before JS loads) */
      #boot-splash{
        position: fixed; inset: 0;
        background: #081A25 url("/biohum-sales/splash/abertura.png") center/cover no-repeat;
        display: grid; place-items: center;
      }
      #boot-splash .hint{
        position: absolute; bottom: 24px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: rgba(255,255,255,.85);
        font-size: 14px;
        letter-spacing: .2px;
      }
      #root:empty{ display:none; }
    </style>
    <script type="module" crossorigin src="/biohum-sales/assets/index-ZROjoCNA.js"></script>
    <link rel="stylesheet" crossorigin href="/biohum-sales/assets/index-OoVJ7Xuh.css">
  </head>
  <body>
    <div id="boot-splash"><div class="hint">Carregando…</div></div>
    <div id="root"></div>
    <script>
      // Hide boot splash once React mounts
      window.__hideBootSplash = () => {
        const el = document.getElementById('boot-splash');
        if (!el) return;
        el.style.transition = "opacity 250ms ease";
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 260);
      };
    </script>
  </body>
</html>
